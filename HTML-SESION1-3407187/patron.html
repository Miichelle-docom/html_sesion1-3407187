<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reto Patrón</title>
    <style>
        body{
            background-color: rgb(200, 227, 184);
        }

        .cuadro{
            display: block;
            width: 350px;
            height: 200px;
            border-top: double 10px rgb(177, 145, 12);
            border-right: dashed 8px rgb(112, 47, 157);
            border-left: solid 10px rgb(31, 78, 122);
            border-bottom: solid 2px rgb(27, 161, 196);
            margin: 40px;
        }
    </style>
</head>
<body>
    <div class="cuadro"></div>
</body>
</html>
