<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evidencia</title>
    <style>

        @font-face{
            font-family: 'Inter';
            src: url('inter/Inter.ttf') format('truetype');
            font-style: normal;
            font-weight: 400;
            font-display: swap;
        }

        @font-face{
            font-family: 'Inter';
            src: url('inter/Inter.ttf') format('truetype');
            font-style: bold;
            font-weight: 700;
            font-display: swap;
        }
        
        *{
            margin: 0;
            padding: 0;
        }

        body{
            font-family: 'Inter', sans-serif;
        }

        .card__fondo{
            display: block;
            width: 300px;
            height: 400px;
            background-color: rgb(80, 66, 155);
            margin: 20px auto;
            padding-top: 10px;
        }

        .card__img{
            display: block;
            width: 260px;
            height: 200px;
            object-fit: cover;
            border-radius: 20px;
            border: 10px solid rgb(255, 165, 86);
            margin-left: 10px;
        }

            .card__text{
                width: 260px;
                height: 180px;
                background-color: rgb(69, 69, 69);
                margin-top: -30px;
                margin-left: 10px;
                padding: 10px;
                border-radius: 20px;
            }

            .texto{
                text-align: center;
                color: white;
                font-size: 14px;
            }

            .titulo{
                text-align: center;
                color: rgb(255, 244, 187);
                font-weight: bold;
                font-size: 15px;
            }

            .boton{
                display: block;
                width: 70px;
                height: 40px;
                background-color: rgb(255, 165, 86);
                color: white;
                border: none;
                border-radius: 5px;
                margin: 10px auto;
                cursor: pointer;
            }
    </style>
</head>
<body>
    <div class="card__fondo">
        <img class="card__img" src="retrato.jpg.jpg" alt="retrato">
        <div class="card__text">
            <p class="titulo">Michelle Campos</p>
            <br>
            <p class="texto">Software engineer with a knack for problem-solving, I thrive on coding challenges and crafting elegant solutions.</p>
            <button class="boton">Follow</button>
        </div>
    </div>
</body>
</html>
