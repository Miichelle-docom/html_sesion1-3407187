<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Profile - 3407187</title>
    <style>
        
        *{
            margin: 0;
            padding: 0;
        }

        body{
            background-color: #E5E6E8;
        }

        .card{
            display: block;
            width: 300px;
            height: 400px;
            background-color: #fff;
            margin: 20px auto;
        }

        .card__company{
            display: block;
            width: 100%;
            height: 100px;
            background-color: #404042;
        }

        .card__flag{
            display: block;
            width: auto;
            height: 50px;
            background-color: #7ACBC7;
        }

        .card__image{
            display: block;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: white 5px solid;
            margin-top: -90px;
            margin-left: auto;
            margin-right: auto;
        }

    </style>
</head>
<body>
    <div class="card">
        <div class="card__company"></div>
        <div class="card__flag"></div>
        <img class="card__image" src="retrato.avif" alt="retrato">
    </div>
</cuerpo>
</html>
